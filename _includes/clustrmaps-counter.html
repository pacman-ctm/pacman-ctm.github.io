<!-- MapMyVisitors global counter (fires on every page) -->
<div style="display:none;">
  <script type="text/javascript" id="mapmyvisitors" src="//mapmyvisitors.com/map.js?d=QTxr5pjXKYjkms-OqKjcN2pEF7rYZUpDkjTs7-0jP5c&cl=ffffff&w=a"></script>
</div>

<!-- Track PDF clicks -->
<script type="text/javascript">
  document.addEventListener('DOMContentLoaded', function() {
    // Find all PDF links
    var pdfLinks = document.querySelectorAll('a[href$=".pdf"]');
    
    pdfLinks.forEach(function(link) {
      link.addEventListener('click', function(e) {
        // Fire MapMyVisitors counter
        if (typeof mapmyvisitors !== 'undefined') {
          // Trigger the counter (this simulates a page view)
          var img = new Image();
          img.src = 'https://mapmyvisitors.com/map.js?d=QTxr5pjXKYjkms-OqKjcN2pEF7rYZUpDkjTs7-0jP5c&cl=ffffff&w=a';
        }
      });
    });
  });
</script>
